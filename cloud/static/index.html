<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>草莓园区巡检机器人 · 云端控制平台</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-router@4.3.0/dist/vue-router.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e27;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* 顶部导航 */
.topnav{display:flex;align-items:center;gap:0;background:linear-gradient(90deg,#0d1117,#111820);border-bottom:1px solid #1e3a5f;padding:0 20px;height:52px;flex-shrink:0}
.brand{font-size:15px;font-weight:700;color:#00e676;letter-spacing:1px;margin-right:28px;white-space:nowrap}
.nav-links{display:flex;gap:4px;flex:1}
.nav-links a{padding:6px 14px;border-radius:5px;color:#8b949e;text-decoration:none;font-size:13px;transition:all 0.18s;white-space:nowrap}
.nav-links a:hover{color:#c9d1d9;background:rgba(30,58,95,0.4)}
.nav-links a.router-link-active{color:#00e676;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2)}
.status-bar{display:flex;align-items:center;gap:14px;margin-left:auto}
.status-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#8b949e}
.status-dot{width:7px;height:7px;border-radius:50%;transition:all 0.3s}
.status-dot.on{background:#00e676;box-shadow:0 0 6px #00e676,0 0 14px #00e67650;animation:pulse-on 2s ease-in-out infinite}
.status-dot.off{background:#ff5252;box-shadow:0 0 4px #ff525260;animation:pulse-off 3s ease-in-out infinite}
@keyframes pulse-on{0%,100%{box-shadow:0 0 6px #00e676,0 0 14px #00e67650;opacity:1}50%{box-shadow:0 0 2px #00e67680,0 0 5px #00e67630;opacity:0.7}}
@keyframes pulse-off{0%,100%{opacity:1}50%{opacity:0.45}}
.clock{font-size:12px;color:#4a5568;letter-spacing:1px}
.report-badge{display:inline-block;background:#ff5252;color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;margin-left:4px;min-width:16px;text-align:center;line-height:14px;vertical-align:middle}

/* 页面通用 */
.page-inner{flex:1;overflow-y:auto;padding:16px 20px}
.page-content-wrap{max-width:1200px;margin:0 auto}
.page-title{font-size:16px;font-weight:600;color:#e0e0e0;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1e3a5f}
.card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:8px;padding:20px}

/* 控制台 */
.dashboard{display:grid;grid-template-columns:37% 63%;grid-template-rows:1fr;gap:12px;padding:12px;height:100%}
.video-panel{grid-column:1;grid-row:1;display:flex;flex-direction:column;gap:10px}
.chart-area{grid-column:2;grid-row:1;display:flex;flex-direction:column;gap:12px}
.video-box{background:#000;border:1px solid #1e3a5f;border-radius:8px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative}
.video-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:#3d4f6b}
.video-frame-box{flex:1;display:flex;align-items:center;justify-content:center;background:#000;border:1px solid #1e3a5f;border-radius:8px;overflow:hidden;position:relative;min-height:0;aspect-ratio:16/9}
.video-frame-box img{width:100%;height:100%;object-fit:contain;display:block}
.video-frame-box .video-offline{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.72);color:#64748b;font-size:13px;pointer-events:none}
.video-offline .offline-icon{font-size:42px;margin-bottom:10px;display:block}
.video-status-bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11px;color:#8b949e}
.video-live-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.video-live-dot.on{background:#ff5252;animation:pulse-on 1.5s infinite}
.video-live-dot.off{background:#555}
.sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sensor-card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:6px;padding:12px}
.sensor-label{font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sensor-value{font-size:20px;font-weight:700;color:#00e676}
.sensor-unit{font-size:11px;color:#6b7280;margin-left:3px}
.zone-monitor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.zone-monitor-card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:8px;padding:12px}
.zone-monitor-card.warn{border-color:rgba(255,82,82,0.65);box-shadow:0 0 14px rgba(255,82,82,0.08)}
.zone-monitor-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.zone-monitor-title{font-size:13px;font-weight:600;color:#e0e0e0}
.zone-monitor-state{font-size:11px;border:1px solid;border-radius:4px;padding:2px 8px}
.zone-monitor-state.ok{color:#00e676;border-color:rgba(0,230,118,0.35);background:rgba(0,230,118,0.06)}
.zone-monitor-state.warn{color:#ff5252;border-color:rgba(255,82,82,0.4);background:rgba(255,82,82,0.06)}
.zone-metric-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.zone-metric{border:1px solid rgba(30,58,95,0.45);border-radius:6px;padding:8px;background:rgba(30,58,95,0.12)}
.zone-metric.bad{border-color:rgba(255,82,82,0.45);background:rgba(255,82,82,0.05)}
.zone-metric-label{font-size:10px;color:#4a5568;letter-spacing:1px;margin-bottom:3px}
.zone-metric-value{font-size:18px;font-weight:700;color:#00e676}
.zone-metric.bad .zone-metric-value{color:#ff5252}
.zone-advice{font-size:11px;color:#8b949e;line-height:1.55;margin-top:8px;min-height:34px}
.zone-advice.warn{color:#ff8a80}
.chart-card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:8px;padding:10px;flex:1;display:flex;flex-direction:column}
.chart-title{font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

/* 雷达占位 */
.radar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
.radar-circle{position:relative;width:110px;height:110px}
.radar-ring{position:absolute;border-radius:50%;border:1px solid rgba(0,230,118,0.25);top:50%;left:50%;transform:translate(-50%,-50%)}
.radar-ring.r1{width:110px;height:110px}.radar-ring.r2{width:72px;height:72px}.radar-ring.r3{width:36px;height:36px}
.radar-sweep{position:absolute;width:50%;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(0,230,118,0.7) 100%);top:50%;left:50%;transform-origin:0% 50%;animation:radar-spin 3s linear infinite;border-radius:0 2px 2px 0;filter:drop-shadow(0 0 4px #00e676)}
.radar-dot{position:absolute;width:7px;height:7px;background:#00e676;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px #00e676}
@keyframes radar-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-label{margin-top:16px;color:rgba(0,230,118,0.55);font-size:12px;letter-spacing:3px;animation:blink-txt 2s ease-in-out infinite}
@keyframes blink-txt{0%,100%{opacity:1}50%{opacity:0.3}}

/* 机器人状态 */
.robot-card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:8px;padding:12px}
.robot-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.robot-state-tag{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid}
.robot-state-tag.online{color:#00e676;border-color:rgba(0,230,118,0.4);background:rgba(0,230,118,0.06)}
.robot-state-tag.offline{color:#ff5252;border-color:rgba(255,82,82,0.35);background:rgba(255,82,82,0.05)}
.robot-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px}
.robot-stat{color:#8b949e}.robot-stat span{color:#c9d1d9}

/* 园区管理 */
.zones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.zone-card{background:linear-gradient(180deg,#0d1117,#111820);border:1px solid #1e3a5f;border-radius:8px;padding:20px;transition:border-color 0.2s}
.zone-card:hover{border-color:rgba(0,230,118,0.3)}
.zone-name{font-size:15px;font-weight:600;color:#e0e0e0;margin-bottom:8px}
.zone-meta{font-size:12px;color:#6b7280;margin-bottom:12px}
.zone-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:4px;border:1px solid}
.zone-status.active{color:#00e676;border-color:rgba(0,230,118,0.4);background:rgba(0,230,118,0.06)}
.zone-status.idle{color:#fbbf24;border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.05)}
.zone-actions{display:flex;gap:8px;margin-top:14px}
.zone-sensor-line{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:19px;line-height:1.6}
.zone-sensor-humi{color:#7ee787}
.zone-sensor-light{color:#fff176;font-weight:600}
.btn{padding:6px 14px;border-radius:5px;border:1px solid;font-size:12px;cursor:pointer;transition:all 0.18s;background:transparent}
.btn-green{border-color:rgba(0,230,118,0.4);color:#00e676}
.btn-green:hover{background:rgba(0,230,118,0.1);box-shadow:0 0 10px rgba(0,230,118,0.2)}
.btn-blue{border-color:rgba(68,138,255,0.4);color:#448aff}
.btn-blue:hover{background:rgba(68,138,255,0.1)}
.btn-red{border-color:rgba(255,82,82,0.35);color:#ff5252}
.btn-red:hover{background:rgba(255,82,82,0.08)}
.btn-gray{border-color:#1e3a5f;color:#8b949e}
.btn-gray:hover{background:rgba(30,58,95,0.4)}

/* ═══ 全局重置 ═══ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
  background: #0a0e27;
  color: #e0e0e0;
  width: 100vw; height: 100vh;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

/* ═══ 顶部栏 ═══ */
.header {
  height: 56px;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid #00e67633;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: relative; z-index: 10;
}
.header h1 {
  font-size: 20px; font-weight: 600;
  background: linear-gradient(90deg, #00e676, #00b0ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.header-right {
  display: flex; align-items: center; gap: 16px;
}
.header .time {
  color: #00e676; font-size: 13px; font-family: 'Courier New', monospace;
}
.status-group {
  display: flex; align-items: center; gap: 12px; font-size: 12px;
}
.status-item {
  display: flex; align-items: center; gap: 5px;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  animation: pulse 2s infinite;
}
.status-dot.on { background: #00e676; }
.status-dot.off { background: #ff5252; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ═══ 导航栏 ═══ */
.nav-bar {
  height: 40px;
  background: #0d1117;
  border-bottom: 1px solid #1e3a5f;
  display: flex; align-items: center;
  padding: 0 24px;
  position: relative; z-index: 10;
}
.nav-bar a {
  color: #8b949e; text-decoration: none;
  font-size: 13px; padding: 8px 16px;
  border-radius: 4px;
  transition: all 0.3s;
}
.nav-bar a:hover { color: #e0e0e0; background: #161b2280; }
.nav-bar a.router-link-active {
  color: #00e676; background: #00e67615;
}

/* ═══ 页面容器 ═══ */
.page-container {
  height: calc(100vh - 96px);
  overflow-y: auto;
  position: relative; z-index: 1;
}
.page-container::-webkit-scrollbar { width: 6px; }
.page-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* ═══ 面板通用 ═══ */
.panel {
  background: linear-gradient(180deg, #0d1117 0%, #111820 100%);
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 16px;
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00e676, transparent);
}
.panel-title {
  font-size: 14px; color: #8b949e; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.panel-title span { font-size: 16px; }

/* ═══ Dashboard 大屏布局 ═══ */
.dashboard {
  display: grid;
  grid-template-columns: 35% 25% 40%;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  height: 100%;
}

/* ═══ 视频区 ═══ */
.video-panel { grid-column: 1; grid-row: 1 / 3; }
.video-frame-box {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #000; border-radius: 6px; overflow: hidden;
  position: relative; min-height: 0;
}
.video-frame-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
.video-offline { color: #555; font-size: 14px; text-align: center; }
.video-frame-box .video-offline {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.72); pointer-events: none;
}
.video-offline .offline-icon { font-size: 48px; margin-bottom: 12px; display: block; }
.video-status-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; font-size: 11px; color: #8b949e;
}
.video-live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.video-live-dot.on { background: #ff5252; animation: pulse 1.5s infinite; }
.video-live-dot.off { background: #555; }

/* ═══ 传感器卡片 ═══ */
.chart-area { grid-column: 2; grid-row: 1 / 3; display: flex; flex-direction: column; gap: 12px; }
.sensor-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
.sensor-card {
  background: #161b2280; border: 1px solid #1e3a5f;
  border-radius: 6px; padding: 10px; text-align: center;
}
.sensor-card .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.sensor-card .value { font-size: 22px; font-weight: bold; }
.sensor-card .unit { font-size: 11px; color: #8b949e; }
.sensor-card .range { font-size: 10px; color: #555; margin-top: 2px; }
.c-temp { color: #4fc3f7; } .c-humi { color: #81c784; }
.c-light { color: #fff176; } .c-co2 { color: #ce93d8; }
.chart-panel { flex: 1; min-height: 0; }
.chart-container { width: 100%; flex: 1; min-height: 0; }

/* ═══ 病害面板 ═══ */
.disease-panel { grid-column: 3; grid-row: 1; }
.disease-status {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 8px; padding: 16px;
  transition: all 0.5s ease;
}
.disease-status.ok {
  background: radial-gradient(ellipse at center, #00e67610 0%, transparent 70%);
  border: 1px solid #00e67630;
}
.disease-status.warn {
  background: radial-gradient(ellipse at center, #ff525215 0%, transparent 70%);
  border: 1px solid #ff525240;
  animation: warn-pulse 1.5s infinite;
}
@keyframes warn-pulse {
  0%, 100% { border-color: #ff525240; }
  50% { border-color: #ff5252; box-shadow: 0 0 20px #ff525230; }
}
.disease-icon { font-size: 40px; margin-bottom: 8px; }
.disease-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.disease-sub { font-size: 12px; color: #8b949e; }
.disease-time { font-size: 11px; color: #555; margin-top: 6px; }
.disease-chart-area { height: 120px; margin-top: 8px; }
.alert-list { max-height: 100px; overflow-y: auto; margin-top: 8px; }
.alert-item {
  padding: 5px 10px; margin-bottom: 3px;
  border-radius: 4px; font-size: 11px;
  border-left: 3px solid #ff9800; background: #ff980010;
}
.alert-item.danger { border-left-color: #ff5252; background: #ff525210; }
.alert-item .alert-time { color: #555; font-size: 10px; }

/* ═══ AI面板 ═══ */
.ai-panel { grid-column: 3; grid-row: 2; }
.ai-content {
  flex: 1; overflow-y: auto; min-height: 0;
  padding: 12px; background: #0a0e1a; border-radius: 6px;
  border: 1px solid #1e3a5f;
  font-size: 13px; line-height: 1.8; color: #c9d1d9;
  white-space: pre-wrap; word-break: break-all;
}
.ai-content::-webkit-scrollbar { width: 4px; }
.ai-content::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.ai-btn {
  margin-top: 10px; padding: 10px 0; width: 100%;
  border: 1px solid #00e67650; border-radius: 6px;
  background: linear-gradient(135deg, #00e67615, #00b0ff15);
  color: #00e676; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
}
.ai-btn:hover { background: linear-gradient(135deg, #00e67630, #00b0ff30); box-shadow: 0 0 15px #00e67620; }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ═══ 机器人状态卡片 ═══ */
.robot-card {
  background: #161b2280; border: 1px solid #1e3a5f;
  border-radius: 6px; padding: 10px 14px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
}
.robot-card .robot-icon { font-size: 28px; }
.robot-card .robot-info { flex: 1; }
.robot-card .robot-info .label { font-size: 11px; color: #8b949e; }
.robot-card .robot-info .val { font-size: 14px; font-weight: 600; }

/* ═══ 通用页面 ═══ */
.page-inner { padding: 20px; }
.page-title { font-size: 20px; margin-bottom: 16px; color: #00e676; }

/* ═══ 园区管理 ═══ */
.zone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.zone-card {
  background: #0d1117; border: 1px solid #1e3a5f; border-radius: 8px;
  padding: 16px; cursor: pointer; transition: all 0.3s;
}
.zone-card:hover { border-color: #00e676; box-shadow: 0 0 10px #00e67620; }
.zone-card h3 { color: #00e676; margin-bottom: 8px; }
.zone-card p { font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.zone-card .sensor-mini { display: flex; gap: 12px; font-size: 12px; color: #c9d1d9; }

/* ═══ 表单 ═══ */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #1e3a5f;
  border-radius: 6px; color: #e0e0e0; font-size: 14px; outline: none;
}
.form-group input:focus { border-color: #00e676; }

.btn {
  padding: 8px 20px; border: 1px solid #00e67650; border-radius: 6px;
  background: #00e67615; color: #00e676; font-size: 13px;
  cursor: pointer; transition: all 0.3s;
}
.btn:hover { background: #00e67630; }
.btn-danger { border-color: #ff525250; background: #ff525215; color: #ff5252; }
.btn-danger:hover { background: #ff525230; }

/* ═══ 地图页 ═══ */
.map-container {
  background: #000; border: 1px solid #1e3a5f; border-radius: 8px;
  height: calc(100vh - 200px); position: relative; overflow: hidden;
}
.map-container canvas { width: 100%; height: 100%; }
.map-toolbar {
  display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
}

const MAX_POINTS=60;
const AGRI_LIMITS={
  humidity:{healthyMin:60,healthyMax:80,drought:50,wet:85},
  light:{healthyMin:40,healthyMax:70,low:20}
};
const DEVICE_ZONE_MAP={esp32_001:'A',esp32_s3_B001:'B'};
const zoneSeries={
  A:{labels:[],humidity:[],light:[]},
  B:{labels:[],humidity:[],light:[]},
};
const zoneSampleBuf={
  A:{n:0,h:0,l:0},
  B:{n:0,h:0,l:0},
};
const zoneCharts={A:null,B:null};

function normalizeRobot\u72b6\u6001(data){
  const d=data||{};
  return {
    ...globalState.robot\u72b6\u6001,
    ...d,
    battery:Number(d.battery ?? globalState.robot\u72b6\u6001.battery ?? 0),
    position_x:Number(d.position_x ?? d.x ?? globalState.robot\u72b6\u6001.position_x ?? 0),
    position_y:Number(d.position_y ?? d.y ?? globalState.robot\u72b6\u6001.position_y ?? 0),
    position_theta:Number(d.position_theta ?? d.theta ?? d.yaw ?? globalState.robot\u72b6\u6001.position_theta ?? 0),
    state:d.state || globalState.robot\u72b6\u6001.state || 'offline'
  };
}

function yRange(arr){
  if(!arr.length) return {min:undefined,max:undefined};
  const mn=Math.min(...arr),mx=Math.max(...arr);
  const pad=(mx-mn)*0.25||1;
  return {min:parseFloat((mn-pad).toFixed(2)),max:parseFloat((mx+pad).toFixed(2))};
}
function resolveSensorRegion(d){
  const region=String(d.region||'').trim().toUpperCase();
  if(region==='A'||region==='B') return region;
  return DEVICE_ZONE_MAP[d.device_id]||'A';
}
function normalizeLightPercent(light){
  const value=Number(light||0);
  return Math.max(0,Math.min(100,Math.round(value)));
}
function sensor\u72b6\u6001(sensor){
  const h=Number(sensor.humidity||0),l=normalizeLightPercent(sensor.light);
  if(h<AGRI_LIMITS.humidity.drought) return {state:'warn',text:'干旱预警',message:'土壤湿度低于 50%，建议检查灌溉。'};
  if(h>AGRI_LIMITS.humidity.wet) return {state:'warn',text:'过湿预警',message:'土壤湿度高于 85%，存在沤根和真菌风险。'};
  if(l<AGRI_LIMITS.light.low) return {state:'warn',text:'弱光预警',message:'光照低于 20%，建议评估补光。'};
  if(h>=AGRI_LIMITS.humidity.healthyMin&&h<=AGRI_LIMITS.humidity.healthyMax&&l>=AGRI_LIMITS.light.healthyMin&&l<=AGRI_LIMITS.light.healthyMax) return {state:'ok',text:'适宜',message:'湿度和光照均处于草莓适宜生长区间。'};
  return {state:'ok',text:'观察',message:'数据接近适宜区间，继续观察趋势。'};
}
function push\u56ed\u533aSensorPointNow(region,humi,light,label){
  const series=zoneSeries[region];if(!series) return;
  const t=label||new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  series.labels.push(t);
  series.humidity.push(+Number(humi||0).toFixed(1));
  series.light.push(normalizeLightPercent(light));
  if(series.labels.length>MAX_POINTS){series.labels.shift();series.humidity.shift();series.light.shift();}
  update\u56ed\u533aChart(region);
}
function update\u56ed\u533aChart(region){
  const chart=zoneCharts[region],series=zoneSeries[region];
  if(!chart||!series) return;
  chart.setOption({xAxis:{data:[...series.labels]},series:[{data:[...series.humidity]},{data:[...series.light]}]});
}
function hydrate\u56ed\u533aSensorHistory(region,history){
  if(!Array.isArray(history)) return;
  const series=zoneSeries[region];if(!series) return;
  series.labels.length=0;series.humidity.length=0;series.light.length=0;
  history.slice(-MAX_POINTS).forEach(item=>{
    const dt=item.created_at?new Date(String(item.created_at).replace(' ','T')):null;
    const label=dt&&!Number.isNaN(dt.getTime())?dt.toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
    push\u56ed\u533aSensorPointNow(region,Number(item.humidity||0),Number(item.light||0),label);
  });
}
async function load\u56ed\u533aSensorData(){
  const pairs=[['A',1],['B',2]];
  await Promise.all(pairs.map(async([region,id])=>{
    try{
      const r=await fetch(`/api/zones/${id}`);
      const d=await r.json();
      if(d.zone?.latest_sensor){
        const latest={...d.zone.latest_sensor,region};
        globalState.zoneSensors[region]=latest;
        if(region==='A') globalState.latestSensor=latest;
      }
      hydrate\u56ed\u533aSensorHistory(region,d.zone?.sensor_history||[]);
    }catch(e){}
  }));
}
function push\u56ed\u533aSensorPoint(region,humi,light){
  const buf=zoneSampleBuf[region];if(!buf) return;
  buf.n++;buf.h+=(humi||0);buf.l+=(light||0);
  if(buf.n<3) return;
  const n=buf.n;
  humi=buf.h/n;light=buf.l/n;
  zoneSampleBuf[region]={n:0,h:0,l:0};
  const t=new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  push\u56ed\u533aSensorPointNow(region,humi,light,t);
}

/* WebSocket */
let ws=null;
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{globalState.wsConnected=true;};
  ws.onclose=()=>{globalState.wsConnected=false;globalState.robotConnected=false;setTimeout(connectWS,3000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.type==='sensor_data'||msg.type==='sensor'||msg.type==='sensor_update'){
        const d=msg.data||msg;
        const region=resolveSensorRegion(d);
        d.region=region;
        globalState.latestSensor=d;
        globalState.zoneSensors[region]=d;
        if(d.device_id) globalState.esp32Online[d.device_id]=Date.now();
        push\u56ed\u533aSensorPoint(region,d.humidity,d.light);
      } else if(msg.type==='esp32_status'){
        const d=msg.data||{};
        if(d.device_id) globalState.esp32Online[d.device_id]=d.online?Date.now():0;
      } else if(msg.type==='robot_status'||msg.type==='status'){
        globalState.robot\u72b6\u6001=normalizeRobot\u72b6\u6001(msg.data||msg);
        globalState.robotConnected=true;
      } else if(msg.type==='robot_connected'){
        globalState.robotConnected=true;
      } else if(msg.type==='robot_disconnected'){
        globalState.robotConnected=false;
      } else if(msg.type==='mqtt_status'){
        globalState.mqttConnected=msg.data?.connected||false;
      } else if(msg.type==='new_detection'||msg.type==='disease_alert'){
        globalState.latestDetection=msg.data;
        globalState.unreadDetections++;
        if(msg.data?.disease_count>0){
          globalState.alerts.unshift({
            time:msg.data.time||new Date().toLocaleTimeString(),
            title:'病害告警',
            message:`发现 ${msg.data.result||'未知病害'} ${msg.data.disease_count} 处`,
            level:'danger'
          });
          if(globalState.alerts.length>50) globalState.alerts.pop();
        }
      } else if(msg.type==='nav_feedback'){
        if(msg.data) globalState.nav\u72b6\u6001={active:true,...msg.data,distanceRemaining:Number(msg.data.distanceRemaining ?? 0)};
      } else if(msg.type==='nav_complete'){
        globalState.nav\u72b6\u6001={active:false,result:msg.data?.result||'completed',distanceRemaining:0};
      } else if(msg.type==='nav_ready'){
        globalState.nav2Ready=msg.data?.ready||false;
      } else if(msg.type==='waypoint_feedback'){
        if(msg.data) globalState.wpProgress={active:true,...msg.data};
      } else if(msg.type==='patrol_completed'){
        globalState.patrolRefreshSignal++;
        globalState.wpProgress={active:false,current:0,total:0};
      } else if(msg.type==='inspection_task_created'){
        const d=msg.data||{};
        globalState.inspection={active:!!d.sent,taskId:d.task_id||d.cloud_task_id,region:d.region||'',stage:d.sent?'sent':'pending',detail:d.sent?'sent to robot':'robot bridge offline',success:null,message:''};
        Object.assign(globalState.inspect\u72b6\u6001,{active:!!d.sent,task_id:d.task_id||d.cloud_task_id||'',region:d.region||'',stage:d.sent?'sent':'pending',detail:d.sent?'sent to robot':'robot bridge offline',success:null,message:''});
        globalState.patrolRefreshSignal++;
      } else if(msg.type==='inspection_feedback'){
        const d=msg.data||{};
        globalState.inspection={...globalState.inspection,active:true,taskId:d.cloud_task_id||d.task_id||globalState.inspection.taskId,region:d.region||globalState.inspection.region,stage:d.stage||'running',detail:d.detail||'',success:null,message:''};
        Object.assign(globalState.inspect\u72b6\u6001,{active:true,task_id:d.cloud_task_id||d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:d.stage||'running',detail:d.detail||'',success:null,message:''});
      } else if(msg.type==='inspection_result'){
        const d=msg.data||{};
        globalState.inspection={...globalState.inspection,active:false,taskId:d.cloud_task_id||d.task_id||globalState.inspection.taskId,region:d.region||globalState.inspection.region,stage:d.success?'completed':'failed',detail:d.message||'',success:!!d.success,message:d.message||''};
        Object.assign(globalState.inspect\u72b6\u6001,{active:false,task_id:d.cloud_task_id||d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:d.success?'done':'failed',detail:d.message||'',success:!!d.success,message:d.message||''});
        globalState.patrolRefreshSignal++;
      } else if(msg.type==='inspect_started'){
        const d=msg.data||{};
        Object.assign(globalState.inspect\u72b6\u6001,{active:true,task_id:d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:'started',detail:'任务已启动',success:null,message:''});
      } else if(msg.type==='inspect_feedback'){
        const d=msg.data||{};
        Object.assign(globalState.inspect\u72b6\u6001,{active:true,task_id:d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:d.stage||'running',detail:d.detail||'',success:null,message:''});
      } else if(msg.type==='inspect_complete'){
        const d=msg.data||{};
        Object.assign(globalState.inspect\u72b6\u6001,{active:false,task_id:d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:'done',detail:d.message||'完成',success:true,message:d.message||'完成',result_json:d.result_json||''});
        globalState.patrolRefreshSignal++;
      } else if(msg.type==='inspect_failed'||msg.type==='inspect_busy'){
        const d=msg.data||{};
        Object.assign(globalState.inspect\u72b6\u6001,{active:false,task_id:d.task_id||globalState.inspect\u72b6\u6001.task_id,region:d.region||globalState.inspect\u72b6\u6001.region,stage:'failed',detail:d.message||'失败',success:false,message:d.message||'失败',result_json:d.result_json||''});
        globalState.patrolRefreshSignal++;
      } else if(msg.type==='scheduler_status'){
        globalState.scheduler=msg.data||globalState.scheduler;
      } else if(msg.type==='scheduler_event'){
        globalState.scheduler.last_event=msg.data||globalState.scheduler.last_event;
        globalState.btOps.lastMessage=msg.data?.message||msg.data?.event||'scheduler event';
      } else if(msg.type==='command_ack'){
        const d=msg.data||{};
        globalState.btOps.lastCommand=d.command||d.type||'';
        globalState.btOps.lastMessage=d.message||d.status||'ack';
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      } else if(msg.type==='camera_status'){
        const d=msg.data||{};
        globalState.btOps.camera=d.status||d.state||'unknown';
        globalState.btOps.lastMessage=d.message||globalState.btOps.lastMessage;
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      } else if(msg.type==='camera_topics'){
        const d=msg.data||{};
        globalState.btOps.topics=d.topics||[];
        globalState.btOps.camera=d.ok?'topics_ok':'topics_missing';
        globalState.btOps.lastMessage=d.message||globalState.btOps.lastMessage;
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      } else if(msg.type==='video_status'){
        const d=msg.data||{};
        if(typeof d.pusher_connected==='boolean') globalState.videoPusherConnected=d.pusher_connected;
        globalState.btOps.video=d.status||d.state||'unknown';
        globalState.btOps.lastMessage=d.message||globalState.btOps.lastMessage;
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      } else if(msg.type==='mission_status'){
        const d=msg.data||{};
        globalState.btOps.mission=d.status||d.state||'unknown';
        globalState.btOps.lastMessage=d.message||globalState.btOps.lastMessage;
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      } else if(msg.type==='system_status'){
        const d=msg.data||{};
        globalState.btOps.summary=d.summary||d.status||'unknown';
        globalState.opsChecks=d.checks||[];
        globalState.btOps.lastMessage=d.message||globalState.btOps.lastMessage;
        globalState.btOps.updatedAt=new Date().toLocaleTimeString();
      }
    }catch(ex){}
  };
}

            <button class="btn btn-gray" @click="showAdd=false;newName=''">取消</button>

          </div>
        </div>
      </div>
    </div>
  </div>`,
  setup(){
    const showAdd=ref(false),newName=ref('');
    async function load\u56ed\u533as(){try{const r=await fetch('/api/zones');const d=await r.json();globalState.zones=d.zones||d||[];}catch(e){}}
    async function add\u56ed\u533a(){if(!newName.value.trim())return;try{await fetch('/api/zones',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newName.value})});newName.value='';showAdd.value=false;await load\u56ed\u533as();}catch(e){}}
    async function delete\u56ed\u533a(id){if(!confirm('确认删除？'))return;try{await fetch(`/api/zones/${id}`,{method:'DELETE'});await load\u56ed\u533as();}catch(e){}}

    function edit\u56ed\u533a(){}
    function formatDeviceId(id){return id||'未绑定';}
    function formatMetric(sensor,key,fallback){
      const v=sensor&&sensor[key];
      if(v===undefined||v===null||v==='') return fallback;
      const n=Number(v);
      if(Number.isNaN(n)) return fallback;
      return key==='light'?Math.round(n):n.toFixed(1);
    }

      if(!sensor||!sensor.created_at) return false;
      const ts=new Date(String(sensor.created_at).replace(' ','T')).getTime();
      if(Number.isNaN(ts)||Date.now()-ts>60000) return false;
      const humi=Number(sensor.humidity), light=Number(sensor.light);
      return humi>=0&&humi<=100&&light>=0&&light<=100;
    }

    return{globalState,showAdd,newName,add\u56ed\u533a,delete\u56ed\u533a,select\u56ed\u533a,edit\u56ed\u533a,formatDeviceId,formatMetric,isFreshSensor};
  }
};

    let navTarget = reactive({ x: null, y: null, theta: 0 });

    // 绘制路径时拖拽设置朝向的状态
    let drawDrag = reactive({ active: false, startX: 0, startY: 0, endX: 0, endY: 0 });
    let navDrag = reactive({ active: false, startX: 0, startY: 0, endX: 0, endY: 0 });
    // 右键修改朝向模式
    let editHeadingState = reactive({ active: false, index: -1 });


    const inspectStageLabel = computed(() => {
      const s = globalState.inspect\u72b6\u6001.stage || 'idle';
      const map = { idle: '空闲', sent: '已下发', started: '已启动', navigate: '导航到区域', track: '识别追踪靠近', infer: '单帧推理', save: '保存结果', done: '完成', failed: '失败' };
      return map[s] || s;
    });

    async function startInspectRegion(region) {
      if (globalState.inspect\u72b6\u6001.active) return alert('当前已有巡检任务执行中');
      Object.assign(globalState.inspect\u72b6\u6001, { active: true, region, task_id: '', stage: 'sent', detail: '下发中', success: null, message: '', result_json: '' });
      try {
        const resp = await fetch('/api/patrol/inspect_region', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ region })
        });
        const d = await resp.json();
        if (!d.ok) {
          Object.assign(globalState.inspect\u72b6\u6001, { active: false, stage: 'failed', success: false, message: d.error || '下发失败', detail: d.error || '下发失败' });
          return alert(d.error || '下发失败');
        }
        Object.assign(globalState.inspect\u72b6\u6001, { active: true, region, task_id: d.task_id, stage: 'sent', detail: '任务已下发' });
      } catch(e) {
        Object.assign(globalState.inspect\u72b6\u6001, { active: false, stage: 'failed', success: false, message: e.message, detail: e.message });
        alert('下发失败: ' + e.message);
      }
    }

    async function resetAnomalyCooldown() {
      try {
        const resp = await fetch('/api/patrol/anomaly_cooldown/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const d = await resp.json();
        if (!d.ok) return alert(d.error || '解除冷却失败');
        cooldownMessage.value = '任务冷却已清除，下一次湿度异常会自动触发对应检测';
        setTimeout(() => { cooldownMessage.value = ''; }, 3500);
      } catch(e) {
        alert('解除冷却失败: ' + e.message);
      }
    }
    const robotStateLabel = computed(() => {
      const map = { idle: '待机', patrolling: '巡检中', navigating: '导航中', returning: '回归中', offline: '离线' };
      return map[globalState.robot\u72b6\u6001.state] || globalState.robot\u72b6\u6001.state;
    });

    const amclQualityLabel = computed(() => {
      const a = globalState.amcl;
      if (!a) return '未知';
      const total = a.cov_x + a.cov_y;
      if (total < 0.02) return '优';
      if (total < 0.1) return '良';
      if (total < 0.5) return '差';
      return '极差';
    });
    const amclQualityColor = computed(() => {
      const a = globalState.amcl;
      if (!a) return '#8b949e';
      const total = a.cov_x + a.cov_y;
      if (total < 0.02) return '#00e676';
      if (total < 0.1) return '#ffc107';
      if (total < 0.5) return '#ff9800';
      return '#ff5252';
    });

    const wpProgressPct = computed(() => {
      const wp = globalState.wpProgress;
      if (!wp.active || wp.total === 0) return 0;
      return Math.round((wp.current / wp.total) * 100);
    });
    const wpProgressBar = computed(() => {
      const pct = wpProgressPct.value;
      const filled = Math.round(pct / 10);
      return '\u2588'.repeat(filled) + '\u2591'.repeat(10 - filled);
    });

    const pathLength = computed(() => {
      let len = 0;
      for (let i = 1; i < waypoints.value.length; i++) {
        const dx = waypoints.value[i].x - waypoints.value[i-1].x;
        const dy = waypoints.value[i].y - waypoints.value[i-1].y;
        len += Math.sqrt(dx*dx + dy*dy);
      }
      return len.toFixed(2) + 'm';
    });

    // ── 坐标转换 ──
    function worldToPixel(wx, wy) {
      if (!mapImg) return { px: 0, py: 0 };
      const px = ((wx - mapMeta.origin_x) / mapMeta.resolution) * zoomLevel.value + panOffset.x;
      const py = ((mapMeta.height - (wy - mapMeta.origin_y) / mapMeta.resolution)) * zoomLevel.value + panOffset.y;
      return { px, py };
    }

    function pixelToWorld(cx, cy) {
      const imgX = (cx - panOffset.x) / zoomLevel.value;
      const imgY = (cy - panOffset.y) / zoomLevel.value;
      const wx = imgX * mapMeta.resolution + mapMeta.origin_x;
      const wy = (mapMeta.height - imgY) * mapMeta.resolution + mapMeta.origin_y;
      return { wx, wy };
    }

    function fitMap() {
      if (!mapImg || !mapCanvas.value) return;
      const cw = mapCanvas.value.width;
      const ch = mapCanvas.value.height;
      const iw = mapImg.naturalWidth;
      const ih = mapImg.naturalHeight;
      const scale = Math.min(cw / iw, ch / ih) * 0.9;
      zoomLevel.value = scale;
      panOffset.x = (cw - iw * scale) / 2;
      panOffset.y = (ch - ih * scale) / 2;
    }

    // ── 渲染 ──
    function redraw() {
      if (!ctx || !mapCanvas.value) return;
      const c = mapCanvas.value;
      ctx.clearRect(0, 0, c.width, c.height);

      // 地图图片
      if (mapImg) {
        const iw = mapImg.naturalWidth;
        const ih = mapImg.naturalHeight;
        ctx.drawImage(mapImg, panOffset.x, panOffset.y, iw * zoomLevel.value, ih * zoomLevel.value);
      }

      // 预置点
      presetPoints.value.forEach((pt) => {
        const p = worldToPixel(pt.x, pt.y);
        ctx.beginPath();
        ctx.arc(p.px, p.py, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ab47bc';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#e1bee7';
        ctx.font = '10px sans-serif';
        ctx.fillText(pt.name || '预置点', p.px + 8, p.py - 6);
      });

      // 路径线段
      if (waypoints.value.length > 1) {
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        const p0 = worldToPixel(waypoints.value[0].x, waypoints.value[0].y);
        ctx.moveTo(p0.px, p0.py);
        for (let i = 1; i < waypoints.value.length; i++) {
          const pi = worldToPixel(waypoints.value[i].x, waypoints.value[i].y);
          ctx.lineTo(pi.px, pi.py);
        }
        ctx.stroke();
      }

      // 路径点 + 朝向箭头
      const wpProg = globalState.wpProgress;
      waypoints.value.forEach((wp, i) => {
        const p = worldToPixel(wp.x, wp.y);
        const r = (i === hoverIdx) ? 8 : 5;

        // 颜色: 根据导航进度
        let color;
        if (wpProg.active) {
          if (i < wpProg.current) color = '#66bb6a'; // 已到达: 绿色
          else if (i === wpProg.current) color = '#ff9800'; // 当前: 橙色
          else color = '#42a5f5'; // 未到达: 蓝色
        } else {
          color = i === 0 ? '#00e676' : '#00b0ff';
        }

        ctx.beginPath();
        ctx.arc(p.px, p.py, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 已到达的勾号
        if (wpProg.active && i < wpProg.current) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.fillText('\u2713', p.px - 4, p.py + 4);
        }

        // 当前目标闪烁效果(通过半透明外圈)
        if (wpProg.active && i === wpProg.current) {
          ctx.beginPath();
          ctx.arc(p.px, p.py, 12, 0, Math.PI * 2);
          ctx.strokeStyle = '#ff9800';
          ctx.lineWidth = 2;
          ctx.setLineDash([3, 3]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // 朝向箭头
        const theta = wp.theta || 0;
        if (theta !== 0 || wp.theta === 0) {
          const arrowLen = 20;
          // Canvas: 右为+X, 下为+Y; 世界: 右为+X, 上为+Y → 所以 dy 取反
          const ax = p.px + arrowLen * Math.cos(theta);
          const ay = p.py - arrowLen * Math.sin(theta);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(p.px, p.py);
          ctx.lineTo(ax, ay);
          ctx.stroke();
          // 箭头头
          const hs = 8;
          const angle = Math.atan2(ay - p.py, ax - p.px);
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax - hs * Math.cos(angle - 0.5), ay - hs * Math.sin(angle - 0.5));
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax - hs * Math.cos(angle + 0.5), ay - hs * Math.sin(angle + 0.5));
          ctx.stroke();
        }

        // 序号
        ctx.fillStyle = '#fff';
        ctx.font = '10px sans-serif';
        ctx.fillText(i + 1, p.px + r + 3, p.py + 4);
      });

      // 导航目标点
      if (navTarget.x !== null && mapLoaded.value) {
        const tp = worldToPixel(navTarget.x, navTarget.y);
        // 十字标记
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tp.px - 12, tp.py); ctx.lineTo(tp.px + 12, tp.py);
        ctx.moveTo(tp.px, tp.py - 12); ctx.lineTo(tp.px, tp.py + 12);
        ctx.stroke();
        // 外圈
        ctx.beginPath();
        ctx.arc(tp.px, tp.py, 10, 0, Math.PI * 2);
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px sans-serif';
        ctx.fillText('T', tp.px + 13, tp.py + 4);
        const theta = navTarget.theta || 0;
        const arrowLen = 24;
        const ax = tp.px + arrowLen * Math.cos(theta);
        const ay = tp.py - arrowLen * Math.sin(theta);
        ctx.beginPath();
        ctx.moveTo(tp.px, tp.py);
        ctx.lineTo(ax, ay);
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 导航目标拖拽朝向预览
      if (navDrag.active) {
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(navDrag.startX, navDrag.startY);
        ctx.lineTo(navDrag.endX, navDrag.endY);
        ctx.stroke();
        ctx.setLineDash([]);
        const dx = navDrag.endX - navDrag.startX;
        const dy = navDrag.endY - navDrag.startY;
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len > 8) {
          const angle = Math.atan2(dy, dx);
          const hs = 10;
          ctx.beginPath();
          ctx.moveTo(navDrag.endX, navDrag.endY);
          ctx.lineTo(navDrag.endX - hs * Math.cos(angle - 0.4), navDrag.endY - hs * Math.sin(angle - 0.4));
          ctx.moveTo(navDrag.endX, navDrag.endY);
          ctx.lineTo(navDrag.endX - hs * Math.cos(angle + 0.4), navDrag.endY - hs * Math.sin(angle + 0.4));
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(navDrag.startX, navDrag.startY, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#00e676';
        ctx.fill();
      }

      // 位姿设置箭头预览
      if (poseArrow.startX !== null) {
        const sx = poseArrow.startX, sy = poseArrow.startY;
        const ex = poseArrow.endX, ey = poseArrow.endY;
        const dx = ex - sx, dy = ey - sy;
        const len = Math.sqrt(dx*dx + dy*dy);
        ctx.strokeStyle = '#448aff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        if (len > 8) {
          const angle = Math.atan2(dy, dx);
          const hs = 12;
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(ex - hs * Math.cos(angle - 0.4), ey - hs * Math.sin(angle - 0.4));
          ctx.moveTo(ex, ey);
          ctx.lineTo(ex - hs * Math.cos(angle + 0.4), ey - hs * Math.sin(angle + 0.4));
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#448aff';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 绘制路径拖拽朝向预览
      if (drawDrag.active) {
        ctx.strokeStyle = '#00b0ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(drawDrag.startX, drawDrag.startY);
        ctx.lineTo(drawDrag.endX, drawDrag.endY);
        ctx.stroke();
        ctx.setLineDash([]);
        const ddx = drawDrag.endX - drawDrag.startX;
        const ddy = drawDrag.endY - drawDrag.startY;
        const ddLen = Math.sqrt(ddx*ddx + ddy*ddy);
        if (ddLen > 8) {
          const a = Math.atan2(ddy, ddx);
          ctx.beginPath();
          ctx.moveTo(drawDrag.endX, drawDrag.endY);
          ctx.lineTo(drawDrag.endX - 10*Math.cos(a-0.4), drawDrag.endY - 10*Math.sin(a-0.4));
          ctx.moveTo(drawDrag.endX, drawDrag.endY);
          ctx.lineTo(drawDrag.endX - 10*Math.cos(a+0.4), drawDrag.endY - 10*Math.sin(a+0.4));
          ctx.stroke();
        }
      }

      // 机器人位置
      if (mapLoaded.value) {
        const rp = worldToPixel(globalState.robot\u72b6\u6001.position_x, globalState.robot\u72b6\u6001.position_y);
        ctx.beginPath();
        ctx.arc(rp.px, rp.py, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#ff5252';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText('R', rp.px - 4, rp.py + 4);
      }
    }

    // ── 命中检测 ──
    function hitTestPoint(cx, cy) {
      for (let i = 0; i < waypoints.value.length; i++) {
        const p = worldToPixel(waypoints.value[i].x, waypoints.value[i].y);
        const dx = cx - p.px, dy = cy - p.py;
        if (dx*dx + dy*dy < 100) return i; // 10px半径
      }
      return -1;
    }

    function getCanvasPos(e) {
      const rect = mapCanvas.value.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    // ── Canvas 事件 ──
    function onMouseDown(e) {
      if (e.button === 2) return; // 右键在contextmenu处理
      ctxMenu.show = false;
      const pos = getCanvasPos(e);
      mouseDownPos = { x: pos.x, y: pos.y };

      // 修改朝向模式
      if (editHeadingState.active) {
        const wp = waypoints.value[editHeadingState.index];
        const p = worldToPixel(wp.x, wp.y);
        drawDrag.active = true;
        drawDrag.startX = p.px;
        drawDrag.startY = p.py;
        drawDrag.endX = pos.x;
        drawDrag.endY = pos.y;
        isDragging = true;
        dragType = 'edit_heading';
        return;
      }

      if (mode.value === 'set_pose') {
        poseArrow.startX = pos.x;
        poseArrow.startY = pos.y;
        poseArrow.endX = pos.x;
        poseArrow.endY = pos.y;
        isDragging = true;
        dragType = 'pose_arrow';
        return;
      }

      if (mode.value === 'draw') {
        drawDrag.active = true;
        drawDrag.startX = pos.x;
        drawDrag.startY = pos.y;
        drawDrag.endX = pos.x;
        drawDrag.endY = pos.y;
        isDragging = true;
        dragType = 'draw_heading';
        return;
      }

      if (mode.value === 'nav') {
        navDrag.active = true;
        navDrag.startX = pos.x;
        navDrag.startY = pos.y;
        navDrag.endX = pos.x;
        navDrag.endY = pos.y;
        isDragging = true;
        dragType = 'nav_heading';
        return;
      }

      if (mode.value === 'view' || mode.value === 'nav') {
        const hitIdx = hitTestPoint(pos.x, pos.y);
        if (hitIdx >= 0 && mode.value === 'view') {
          dragType = 'point';
          dragPointIdx = hitIdx;
          isDragging = true;
        } else {
          dragType = 'pan';
          mouseDownPan = { x: panOffset.x, y: panOffset.y };
          isDragging = true;
        }
      }
    }

    function onMouseMove(e) {
      const pos = getCanvasPos(e);

      if (isDragging && (dragType === 'draw_heading' || dragType === 'edit_heading')) {
        drawDrag.endX = pos.x;
        drawDrag.endY = pos.y;
        redraw();
        return;
      }

      if (isDragging && dragType === 'nav_heading') {
        navDrag.endX = pos.x;
        navDrag.endY = pos.y;
        redraw();
        return;
      }

      if (isDragging && dragType === 'pose_arrow') {
        poseArrow.endX = pos.x;
        poseArrow.endY = pos.y;
        redraw();
        return;
      }

      if (isDragging && dragType === 'pan') {
        panOffset.x = mouseDownPan.x + (pos.x - mouseDownPos.x);
        panOffset.y = mouseDownPan.y + (pos.y - mouseDownPos.y);
        redraw();
        return;
      }

      if (isDragging && dragType === 'point') {
        const w = pixelToWorld(pos.x, pos.y);
        const oldTheta = waypoints.value[dragPointIdx].theta || 0;
        waypoints.value[dragPointIdx] = { x: w.wx, y: w.wy, theta: oldTheta };
        redraw();
        return;
      }

      // 悬停检测
      const newHover = hitTestPoint(pos.x, pos.y);
      if (newHover !== hoverIdx) {
        hoverIdx = newHover;
        const cursorMap = { draw: 'crosshair', nav: 'crosshair', set_pose: 'crosshair' };
        mapCanvas.value.style.cursor = hoverIdx >= 0 ? 'grab' : (cursorMap[mode.value] || 'default');
        redraw();
      }
    }

    function onMouseUp(e) {
      const pos = getCanvasPos(e);
      const dist = Math.sqrt((pos.x - mouseDownPos.x)**2 + (pos.y - mouseDownPos.y)**2);

      // 绘制路径拖拽设置朝向
      if (dragType === 'draw_heading' && mode.value === 'draw') {
        const dx = drawDrag.endX - drawDrag.startX;
        const dy = drawDrag.endY - drawDrag.startY;
        const dragDist = Math.sqrt(dx*dx + dy*dy);
        const w = pixelToWorld(drawDrag.startX, drawDrag.startY);
        const theta = dragDist < 5 ? 0 : Math.atan2(-dy, dx);
        waypoints.value.push({ x: w.wx, y: w.wy, theta });
        drawDrag.active = false;
        isDragging = false;
        dragType = '';
        redraw();
        return;
      }

      // 修改朝向模式
      if (dragType === 'edit_heading' && editHeadingState.active) {
        const dx = drawDrag.endX - drawDrag.startX;
        const dy = drawDrag.endY - drawDrag.startY;
        const dragDist = Math.sqrt(dx*dx + dy*dy);
        const theta = dragDist < 5 ? 0 : Math.atan2(-dy, dx);
        waypoints.value[editHeadingState.index] = {
          ...waypoints.value[editHeadingState.index],
          theta
        };
        drawDrag.active = false;
        editHeadingState.active = false;
        editHeadingState.index = -1;
        isDragging = false;
        dragType = '';
        mapCanvas.value.style.cursor = 'default';
        redraw();
        return;
      }

      if (dragType === 'nav_heading' && mode.value === 'nav') {
        const dx = navDrag.endX - navDrag.startX;
        const dy = navDrag.endY - navDrag.startY;
        const dragDist = Math.sqrt(dx*dx + dy*dy);
        const w = pixelToWorld(navDrag.startX, navDrag.startY);
        const theta = dragDist < 5 ? 0 : Math.atan2(-dy, dx);
        sendNavigateTo(w.wx, w.wy, theta);
        navDrag.active = false;
        isDragging = false;
        dragType = '';
        redraw();
        return;
      }

      if (dragType === 'pose_arrow' && mode.value === 'set_pose') {
        const dx = poseArrow.endX - poseArrow.startX;
        const dy = poseArrow.endY - poseArrow.startY;
        const arrowDist = Math.sqrt(dx*dx + dy*dy);
        const w = pixelToWorld(poseArrow.startX, poseArrow.startY);
        // 拖拽距离 < 5px 视为纯点击，theta=0；否则计算方向
        // canvas Y 轴向下, 世界坐标 Y 轴向上, 所以 dy 取反
        const theta = arrowDist < 5 ? 0 : Math.atan2(-dy, dx);
        sendSetPose(w.wx, w.wy, theta);
        poseArrow.startX = null;
        isDragging = false;
        dragType = '';
        redraw();
        return;
      }

      isDragging = false;
      dragType = '';
      dragPointIdx = -1;
    }

    function onWheel(e) {
      e.preventDefault();
      const pos = getCanvasPos(e);
      const oldZoom = zoomLevel.value;
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      const newZoom = Math.min(10, Math.max(0.1, oldZoom * factor));
      // 以鼠标为中心缩放
      panOffset.x = pos.x - (pos.x - panOffset.x) * (newZoom / oldZoom);
      panOffset.y = pos.y - (pos.y - panOffset.y) * (newZoom / oldZoom);
      zoomLevel.value = newZoom;
      redraw();
    }

    function onContextMenu(e) {
      e.preventDefault();
      const pos = getCanvasPos(e);
      const hitIdx = hitTestPoint(pos.x, pos.y);
      if (hitIdx >= 0) {
        ctxMenu.show = true;
        ctxMenu.x = e.clientX;
        ctxMenu.y = e.clientY;
        ctxMenu.index = hitIdx;
      } else if (mode.value === 'draw') {
        // 右键结束绘制
        mode.value = 'view';
      }
    }

    function onDblClick(e) {
      if (mode.value === 'draw') {
        mode.value = 'view'; // 双击结束绘制
      }
    }

    function deletePoint(idx) {
      ctxMenu.show = false;
      if (idx >= 0 && idx < waypoints.value.length) {
        waypoints.value.splice(idx, 1);
        redraw();
      }
    }

    function editHeading(idx) {
      ctxMenu.show = false;
      editHeadingState.active = true;
      editHeadingState.index = idx;
      mapCanvas.value.style.cursor = 'crosshair';
    }

    // ── 操作函数 ──
    function resizeCanvas() {
      if (!mapCanvas.value || !mapWrap.value) return;
      mapCanvas.value.width = mapWrap.value.clientWidth;
      mapCanvas.value.height = mapWrap.value.clientHeight;
      ctx = mapCanvas.value.getContext('2d');
      if (mapImg && mapLoaded.value) fitMap();
      redraw();
    }

    function toggleDraw() {
      mode.value = mode.value === 'draw' ? 'view' : 'draw';
      navDrag.active = false;
      mapCanvas.value.style.cursor = mode.value === 'draw' ? 'crosshair' : 'default';
    }

    function toggleNav() {
      mode.value = mode.value === 'nav' ? 'view' : 'nav';
      navDrag.active = false;
      mapCanvas.value.style.cursor = mode.value === 'nav' ? 'crosshair' : 'default';
    }

    function toggleSetPose() {
      mode.value = mode.value === 'set_pose' ? 'view' : 'set_pose';
      navDrag.active = false;
      mapCanvas.value.style.cursor = mode.value === 'set_pose' ? 'crosshair' : 'default';
    }

    async function sendNavigateTo(wx, wy, theta = 0) {
      navTarget.x = wx;
      navTarget.y = wy;
      navTarget.theta = theta;
      redraw();
      try {
        const resp = await fetch('/api/robot/navigate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: +wx.toFixed(4), y: +wy.toFixed(4), theta: +theta.toFixed(4) })
        });
        const d = await resp.json();
        if (!d.ok) alert(d.error || '发送导航目标失败');
      } catch(e) { alert('发送导航目标失败: ' + e.message); }
    }

    async function sendSetPose(wx, wy, theta = 0) {
      try {
        const resp = await fetch('/api/robot/set_pose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: +wx.toFixed(4), y: +wy.toFixed(4), theta: +theta.toFixed(4) })
        });
        const d = await resp.json();
        if (d.ok) {
          mode.value = 'view';
          mapCanvas.value.style.cursor = 'default';
        } else {
          alert(d.error || '设置位姿失败');
        }
      } catch(e) { alert('设置位姿失败: ' + e.message); }
    }

    async function cancelNav() {
      navTarget.x = null;
      navTarget.y = null;
      navTarget.theta = 0;
      try {
        await fetch('/api/robot/cancel_nav', { method: 'POST' });
      } catch(e) {}
      redraw();
    }

    function clearPath() {
      waypoints.value = [];
      activePathId.value = null;
      redraw();
    }

    async function loadMap() {
      try {
        const qs = '';
        const resp = await fetch('/api/maps/latest' + qs);
        if (!resp.ok) {
          mapLoaded.value = false;
          redraw();
          return;
        }
        const d = await resp.json();
        if (d.map) {
          mapMeta.resolution = d.map.resolution || 0.05;
          mapMeta.origin_x = d.map.origin_x || 0;
          mapMeta.origin_y = d.map.origin_y || 0;
          mapMeta.width = d.map.height || 0;
          mapMeta.height = d.map.height || 0;
          mapImg = new Image();
          mapImg.onload = () => {
            mapMeta.width = mapImg.naturalWidth;
            mapMeta.height = mapImg.naturalHeight;
            mapLoaded.value = true;
            fitMap();
            redraw();
          };
          mapImg.src = '/api/maps/file/' + d.map.filename;
        }
      } catch(e) { console.error('loadMap error', e); }
    }

    function onFileSelected() {
      selectedFileName.value = fileInput.value?.files?.[0]?.name || '';
    }

    async function refreshRegisteredMaps() {
      const qs = '';
      const resp = await fetch('/api/maps' + qs);
      const d = await resp.json();
      registeredMaps.value = d.maps || [];
    }

    async function loadMapById() {
      const m = registeredMaps.value.find(x => x.id === selectedMapId.value);
      if (!m) return;
      mapMeta.resolution = m.resolution || 0.05;
      mapMeta.origin_x   = m.origin_x   || 0;
      mapMeta.origin_y   = m.origin_y   || 0;
      mapImg = new Image();
      mapImg.onload = () => {
        mapMeta.width  = mapImg.naturalWidth;
        mapMeta.height = mapImg.naturalHeight;
        mapLoaded.value = true;
        fitMap(); redraw();
      };
      mapImg.src = '/api/maps/file/' + m.filename;
      showUpload.value = false;
    }

    async function scanFolder() {
      const resp = await fetch('/api/maps/folder_scan');
      const d = await resp.json();
      folderFiles.value = (d.files || []).map(f => ({
        ...f,
        _import\u56ed\u533a: 0
      }));
    }

    async function listJetsonMaps() {
      jetsonLoading.value = true;
      jetsonFiles.value = [];
      try {
        const qs = jetsonHost.value ? `?host=${jetsonHost.value}` : '';
        const resp = await fetch('/api/maps/jetson_files' + qs);
        const d = await resp.json();
        if (!d.ok) { alert(d.error || '连接失败'); return; }
        saveJetsonIp(jetsonHost.value);
        jetsonFiles.value = (d.files || []).map(f => ({
          ...f, _pull\u56ed\u533a: 0
        }));
      } catch(e) { alert('连接失败: ' + e.message); }
      finally { jetsonLoading.value = false; }
    }

    async function pullMap(f) {
      const body = { stem: f.stem, zone_id: 0 };
      if (jetsonHost.value) body.host = jetsonHost.value;
      try {
        const resp = await fetch('/api/maps/pull_from_jetson', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const d = await resp.json();
        if (d.ok) {
          f.registered = true;
          refreshRegisteredMaps();
          alert(`地图 ${f.stem} 已拉取并注册`);
        } else { alert(d.error || '拉取失败'); }
      } catch(e) { alert('拉取失败: ' + e.message); }
    }

    async function importLocal(f) {
      const resp = await fetch('/api/maps/import_local', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stem: f.stem, zone_id: 0 })
      });
      const d = await resp.json();
      if (d.ok) {
        f.registered = true;
        refreshRegisteredMaps();
      } else { alert(d.error || '导入失败'); }
    }

    async function uploadMap() {
      const file = fileInput.value?.files?.[0];
      if (!file) return alert('请选择地图文件');
      const fd = new FormData();
      fd.append('file', file);
      fd.append('zone_id', '0');
      const yamlFile = yamlInput.value?.files?.[0];
      if (yamlFile) fd.append('yaml_file', yamlFile);
      await fetch('/api/maps/upload', { method: 'POST', body: fd });
      showUpload.value = false;
      selectedFileName.value = '';
      selectedYamlName.value = '';
      loadMap();
    }

    function startSave() {
      if (waypoints.value.length < 2) return alert('至少需要2个路径点');
      showSaveForm.value = true;
      savePathName.value = '';
    }

    async function doSavePath() {
      const name = savePathName.value.trim() || '未命名路径';
      const zid = 0;
      const wps = waypoints.value.map(p => ({ x: +p.x.toFixed(4), y: +p.y.toFixed(4), theta: +(p.theta||0).toFixed(4) }));
      await fetch('/api/patrol/paths', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zone_id: zid, name, waypoints_json: JSON.stringify(wps) })
      });
      showSaveForm.value = false;
      loadSavedPaths();
    }


    async function sendPatrol() {
      if (waypoints.value.length < 2) return alert('至少需要2个路径点');
      let wps = waypoints.value.map(p => ({
        x: +p.x.toFixed(4), y: +p.y.toFixed(4), theta: +(p.theta||0).toFixed(4)
      }));
      // 从机器人当前位置找最近航点，跳过已经到达的部分
      const rx = globalState.robot\u72b6\u6001.position_x;
      const ry = globalState.robot\u72b6\u6001.position_y;
      let nearestIdx = 0, nearestDist = Infinity;
      wps.forEach((wp, i) => {
        const d = Math.sqrt((wp.x - rx) ** 2 + (wp.y - ry) ** 2);
        if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
      });
      // 如果机器人距某个航点 < 0.5m，从该点的下一个开始
      if (nearestDist < 0.5 && nearestIdx < wps.length - 1) {
        wps = wps.slice(nearestIdx + 1);
      }
      if (wps.length === 0) return alert('机器人已在终点附近，无需导航');
      try {
        const resp = await fetch('/api/robot/waypoint_nav', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ waypoints: wps, task_id: Date.now().toString() })
        });
        const result = await resp.json();
        if (!result.ok) {
          alert(result.error || '下发失败');
        }
      } catch(e) { alert('下发失败: ' + e.message); }
    }

    async function sendRandomPatrol() {
      const zid = 0;
      const raw = prompt('随机抽巡几个预置点？', '3');
      if (raw === null) return;
      const count = parseInt(raw, 10);
      if (!Number.isFinite(count) || count <= 0) return alert('请输入大于 0 的整数');
      try {
        const resp = await fetch('/api/patrol/tasks/random', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ zone_id: zid, count })
        });
        const d = await resp.json();
        if (!d.ok) return alert(d.error || '随机抽巡下发失败');
        waypoints.value = (d.waypoints || []).map(pt => ({
          x: pt.x,
          y: pt.y,
          theta: pt.theta || 0,
        }));
        activePathId.value = null;
        redraw();
      } catch(e) {
        alert('随机抽巡下发失败: ' + e.message);
      }
    }

    async function loadSavedPaths() {
      try {
        const qs = '';
        const resp = await fetch('/api/patrol/paths' + qs);
        const d = await resp.json();
        savedPaths.value = d.paths || [];
      } catch(e) {}
    }

    async function loadPresetPoints() {
      try {
        const qs = '';
        const resp = await fetch('/api/patrol/preset_points' + qs);
        const d = await resp.json();
        presetPoints.value = d.points || [];
        redraw();
      } catch(e) {}
    }

    async function navigateToPreset(pt) {
      await sendNavigateTo(pt.x, pt.y, pt.theta || 0);
    }

    function appendPresetPoint(pt) {
      waypoints.value.push({ x: pt.x, y: pt.y, theta: pt.theta || 0 });
      redraw();
    }

    function loadPath(p) {
      try {
        const pts = JSON.parse(p.waypoints_json);
        // 兼容旧格式 [x,y] 和新格式 {x,y} 和新格式 {x,y,theta}
        waypoints.value = pts.map(pt => Array.isArray(pt)
          ? { x: pt[0], y: pt[1], theta: 0 }
          : { x: pt.x, y: pt.y, theta: pt.theta || 0 });
        activePathId.value = p.id;
        redraw();
      } catch(e) { console.error('loadPath error', e); }
    }

    async function deletePath(id) {
      if (!confirm('确认删除该路径？')) return;
      await fetch('/api/patrol/paths/' + id, { method: 'DELETE' });
      if (activePathId.value === id) { waypoints.value = []; activePathId.value = null; }
      loadSavedPaths();
    }

    async function deletePresetPoint(id) {
      if (!confirm('确认删除该预置点？')) return;
      await fetch('/api/patrol/preset_points/' + id, { method: 'DELETE' });
      loadPresetPoints();
    }

    function countWaypoints(p) {
      try { return JSON.parse(p.waypoints_json).length; } catch(e) { return 0; }
    }

    // 关闭右键菜单
    function onDocClick() { ctxMenu.show = false; }

    // 导航完成时清除目标标记
    watch(() => globalState.nav\u72b6\u6001.result, (val) => {
      if (val === 'succeeded' || val === 'failed' || val === 'canceled') {
        navTarget.x = null;
        navTarget.y = null;
        navTarget.theta = 0;
      }
      if (mapLoaded.value) redraw();
    });

    // 监听多点导航进度变化刷新
    watch(() => globalState.wpProgress, () => {
      if (mapLoaded.value) redraw();
    }, { deep: true });

// 监听机器人状态变化刷新
    watch(() => globalState.robot\u72b6\u6001, () => {
      if (mapLoaded.value) redraw();
    }, { deep: true });

    onMounted(() => {
      nextTick(async () => {
        // 若 zones 未加载（直接进入地图页）则主动拉取
        if (globalState.zones.length === 0) {
          try {
            const r = await fetch('/api/zones');
            const d = await r.json();
            globalState.zones = d.zones || [];
          } catch(e) {}
        }
        resizeCanvas();
        loadMap();
        loadSavedPaths();
        loadPresetPoints();
        // 绑定Canvas事件
        const cv = mapCanvas.value;
        if (cv) {
          cv.addEventListener('mousedown', onMouseDown);
          cv.addEventListener('mousemove', onMouseMove);
          cv.addEventListener('mouseup', onMouseUp);
          cv.addEventListener('wheel', onWheel, { passive: false });
          cv.addEventListener('contextmenu', onContextMenu);
          cv.addEventListener('dblclick', onDblClick);
        }
        document.addEventListener('click', onDocClick);
      });
      window.addEventListener('resize', resizeCanvas);
    });

    return {
      globalState, mapCanvas, mapWrap, fileInput, yamlInput, mapLoaded, mode, waypoints,
      savedPaths, presetPoints, activePathId, selected\u56ed\u533aId, showSaveForm, savePathName,
      ctxMenu, zoomLevel, pathLength, robotStateLabel,
      amclQualityLabel, amclQualityColor,
      showUpload, selectedFileName, selectedYamlName, localUpload\u56ed\u533aId,
      registeredMaps, selectedMapId, folderFiles,
      refreshRegisteredMaps, loadMapById, scanFolder, importLocal,
      jetsonHost, jetsonFiles, jetsonLoading, jetsonHostHistory, listJetsonMaps, pullMap,
      wpProgressPct, wpProgressBar,
      toggleDraw, toggleNav, toggleSetPose, clearPath, loadMap, uploadMap, onFileSelected,
      startSave, doSavePath, sendPatrol, sendRandomPatrol, startInspectRegion, resetAnomalyCooldown, cooldownMessage, inspectStageLabel,
      loadPath, deletePath, deletePresetPoint, countWaypoints, appendPresetPoint, navigateToPreset, deletePoint,
      editHeading, cancelNav
    };
  }
};

// 巡检记录组件

/* 巡检记录页 */
const RecordsPage={
  template:`
  <div class="page-inner records-page">
    <div class="page-content-wrap records-wrap">
      <div class="records-head">
        <div class="page-title records-title">\u5de1\u68c0\u8bb0\u5f55</div>
        <button class="btn btn-red" :disabled="clearing || !records.length" @click="clearRecords">
          {{clearing?'\u6e05\u7a7a\u4e2d...':'\u6e05\u7a7a\u5de1\u68c0\u8bb0\u5f55'}}
        </button>
      </div>
      <div class="records-table-wrap">
        <table class="record-table">
          <thead><tr><th>\u4efb\u52a1ID</th><th>\u89e6\u53d1\u539f\u56e0</th><th>\u56ed\u533a</th><th>\u5f00\u59cb\u65f6\u95f4</th><th>\u72b6\u6001</th><th>\u7ed3\u679c</th></tr></thead>
          <tbody>
            <tr v-for="r in records" :key="r.id">
              <td>{{r.task_id||r.id}}</td>
              <td>{{triggerReason(r)}}</td>
              <td>{{zoneName(r.zone_id)}}</td>
              <td>{{displayTaskTime(r)}}</td>
              <td><span class="status-badge" :class="r.status">{{statusText(r.status)}}</span></td>
              <td>
                <button class="record-result-btn" :class="{'no-images': r.result_json && !hasResultImages(r)}" :disabled="!has\u7ed3\u679c(r)" @click="open\u7ed3\u679c(r)">
                  {{resultButtonText(r)}}
                </button>
              </td>
            </tr>
            <tr v-if="!records.length"><td colspan="6" style="text-align:center;color:#4a5568;padding:40px">\u6682\u65e0\u5de1\u68c0\u8bb0\u5f55</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div v-if="selected" class="inspect-modal-mask" @click.self="close\u7ed3\u679c">
      <div class="inspect-modal">
        <div class="inspect-modal-head">
          <div class="inspect-modal-title">Inspection Inference \u7ed3\u679c</div>
          <button class="inspect-modal-close" @click="close\u7ed3\u679c">\u5173\u95ed</button>
        </div>
        <div class="inspect-modal-body">
          <div class="inspect-image-list">
            <img v-for="img in resultImages" :key="img" :src="img" alt="\u5de1\u68c0\u7ed3\u679c\u56fe\u7247">
            <div v-if="!resultImages.length" class="inspect-image-empty">
              <div>{{imageEmptyMessage}}</div>
              <div v-if="hasLocalImagePath(parsed\u7ed3\u679c)" class="inspect-image-warning">\u677f\u7aef\u672c\u5730\u56fe\u7247\u8def\u5f84\u4e0d\u80fd\u88ab\u4e91\u7aef\u6d4f\u89c8\u5668\u76f4\u63a5\u8bbf\u95ee</div>
            </div>
          </div>
          <div>
            <div class="inspect-detail-grid">
              <div class="label">\u4efb\u52a1ID</div><div class="value">{{selected.task_id||selected.id}}</div>
              <div class="label">\u89e6\u53d1\u539f\u56e0</div><div class="value">{{triggerReason(selected)}}</div>
              <div class="label">\u56ed\u533a</div><div class="value">{{zoneName(selected.zone_id)}}</div>
              <div class="label">\u65f6\u95f4</div><div class="value">{{displayTaskTime(selected)}}</div>
              <div class="label">\u72b6\u6001</div><div class="value">{{statusText(selected.status)}}</div>
              <div class="label">\u7ed3\u679c</div><div class="value">{{selected.result||'--'}}</div>
              <div class="label">\u56fe\u7247</div><div class="value">{{imageStatusLabel}}</div>
            </div>
            <div class="inspect-result-summary">{{resultSummary}}</div>
            <div class="inspect-json">{{pretty\u7ed3\u679cJson}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`,
  setup(){
    const records=ref([]);
    const clearing=ref(false);
    const selected=ref(null);
    const parsed\u7ed3\u679c=computed(()=>parse\u7ed3\u679c(selected.value));
    const resultImages=computed(()=>extractImages(parsed\u7ed3\u679c.value));
    const pretty\u7ed3\u679cJson=computed(()=>selected.value?.result_json?formatJson(selected.value.result_json):'\u6682\u65e0 JSON \u7ed3\u679c');
    const resultSummary=computed(()=>summarize\u7ed3\u679c(parsed\u7ed3\u679c.value, selected.value));
    const imageStatusLabel=computed(()=>{
      if(resultImages.value.length)return `\u5df2\u4e0a\u4f20 ${resultImages.value.length} \u5f20`;
      if(hasLocalImagePath(parsed\u7ed3\u679c.value))return '\u4ec5\u6709\u677f\u7aef\u672c\u5730\u8def\u5f84';
      if(selected.value?.result_json)return 'YOLO \u56fe\u7247\u672a\u4e0a\u4f20';
      return '--';
    });
    const imageEmptyMessage=computed(()=>{
      if(hasLocalImagePath(parsed\u7ed3\u679c.value))return '\u6682\u65e0\u4e91\u7aef\u53ef\u663e\u793a\u56fe\u7247';
      if(selected.value?.result_json)return 'YOLO \u56fe\u7247\u672a\u4e0a\u4f20';
      return '\u6682\u65e0\u56fe\u7247';
    });
    async function load(){try{const r=await fetch('/api/patrol/tasks?limit=500');const d=await r.json();records.value=d.tasks||d||[];}catch(e){}}
    function statusText(s){return{completed:'\u5df2\u5b8c\u6210',pending:'\u5f85\u6267\u884c',running:'\u6267\u884c\u4e2d',failed:'\u5931\u8d25'}[s]||s||'--';}
    function zoneName(id){const z=globalState.zones.find(z=>z.id===id);return z?z.name:(id?`\u56ed\u533a ${id}`:'--');}
    function displayTaskTime(r){return r?.created_at_local||r?.created_at||'--';}
    function triggerReason(r){return r?.trigger_reason||'--';}
    function parse\u7ed3\u679c(r){if(!r||!r.result_json)return null;try{return JSON.parse(r.result_json);}catch(e){return {raw:r.result_json};}}
    function formatJson(raw){try{return JSON.stringify(JSON.parse(raw),null,2);}catch(e){return raw||'';}}
    function has\u7ed3\u679c(r){return !!(r&&(r.result_json||r.result));}
    function hasResultImages(r){return extractImages(parse\u7ed3\u679c(r)).length>0;}
    function resultButtonText(r){
      if(!has\u7ed3\u679c(r))return r?.result||'--';
      if(!r?.result_json)return r?.result||'--';
      return hasResultImages(r)?'\u67e5\u770b\u7ed3\u679c':'\u67e5\u770b\u7ed3\u679c(\u65e0\u56fe\u7247)';
    }
    function normalizeImageUrl(v){
      if(!v)return'';
      let raw='';
      if(typeof v==='string')raw=v;
      else if(typeof v==='object')raw=v.url||v.path||v.cloud_url||v.image_url||'';
      raw=String(raw||'').trim();
      if(!raw)return'';
      if(raw.startsWith('/uploads/')||raw.startsWith('http://')||raw.startsWith('https://')||raw.startsWith('data:image'))return raw;
      if(raw.startsWith('uploads/'))return '/' + raw;
      return '';
    }
    function collectImagePaths(data){
      if(!data)return[];
      const out=[];
      const keys=['image_path','draw_image_path','result_image_path','image','image_url'];
      keys.forEach(k=>{const v=data[k];if(typeof v==='string')out.push(v);});
      if(Array.isArray(data.results))data.results.forEach(item=>keys.forEach(k=>{const v=item?.[k];if(typeof v==='string')out.push(v);}));
      return out;
    }
    function hasLocalImagePath(data){
      return collectImagePaths(data).some(v=>{
        const s=String(v||'').trim();
        return s && !normalizeImageUrl(s);
      });
    }
    function extractImages(data){
      if(!data)return[];
      const out=[];
      const keys=['cloud_images','images','image_urls','image_url','image','image_path','draw_image','draw_image_path','result_image','result_image_path'];
      function push(v){const u=normalizeImageUrl(v);if(u&&!out.includes(u))out.push(u);}
      keys.forEach(k=>{const v=data[k];Array.isArray(v)?v.forEach(push):push(v);});
      if(Array.isArray(data.results))data.results.forEach(item=>keys.forEach(k=>{const v=item?.[k];Array.isArray(v)?v.forEach(push):push(v);}));
      return out;
    }
    function summarize\u7ed3\u679c(data,r){
      if(!data)return r?.result||'\u6682\u65e0\u7ed3\u6784\u5316\u7ed3\u679c';
      const parts=[];
      ['class','label','type','result','maturity','disease','message'].forEach(k=>{if(data[k])parts.push(`${k}: ${data[k]}`);});
      ['confidence','conf','score'].forEach(k=>{if(data[k]!==undefined&&data[k]!==null)parts.push(`${k}: ${data[k]}`);});
      if(Array.isArray(data.detections))parts.push(`detections: ${data.detections.length}`);
      if(Array.isArray(data.results))parts.push(`results: ${data.results.length}`);
      return parts.length?parts.join(' | '):(r?.result||'\u5df2\u4fdd\u5b58\u63a8\u7406\u7ed3\u679c');
    }
    function open\u7ed3\u679c(r){if(has\u7ed3\u679c(r))selected.value=r;}
    function close\u7ed3\u679c(){selected.value=null;}
    async function clearRecords(){
      if(!records.value.length||clearing.value) return;
      if(!confirm('\u786e\u8ba4\u6e05\u7a7a\u5168\u90e8\u5de1\u68c0\u8bb0\u5f55\uff1f\u6b64\u64cd\u4f5c\u4e0d\u4f1a\u5220\u9664\u5730\u56fe\u548c\u4fdd\u5b58\u8def\u5f84\u3002')) return;
      clearing.value=true;
      try{const r=await fetch('/api/patrol/tasks',{method:'DELETE'});const d=await r.json();if(!d.ok) alert(d.error||'\u6e05\u7a7a\u5931\u8d25');selected.value=null;await load();}
      catch(e){alert('\u6e05\u7a7a\u5931\u8d25: '+e.message);}
      finally{clearing.value=false;}
    }
    onMounted(load);
    watch(()=>globalState.patrolRefreshSignal,load);
    return{records,clearing,selected,parsed\u7ed3\u679c,resultImages,pretty\u7ed3\u679cJson,resultSummary,imageStatusLabel,imageEmptyMessage,statusText,zoneName,displayTaskTime,triggerReason,has\u7ed3\u679c,hasResultImages,resultButtonText,hasLocalImagePath,open\u7ed3\u679c,close\u7ed3\u679c,clearRecords,globalState};
  }
};

        <div class="settings-row"><span class="settings-label">模型</span><input class="settings-input" v-model="cfg.ai_model" placeholder="deepseek-ai/DeepSeek-V4-Pro"></div>
        <button class="settings-save" @click="saveSettings">保存配置</button>
      </div>
      <div v-if="saved" style="color:#00e676;font-size:13px;margin-top:8px">配置已保存</div>
    </div>
  </div>`,
  setup(){
    const cfg=reactive({ai_api_key:'',ai_api_base:'https://api.siliconflow.cn/v1',ai_model:'deepseek-ai/DeepSeek-V4-Pro'});
    const saved=ref(false);
    const zones=ref([]);
    const thresholdSavedId=ref(0);
    const defaultThresholds=()=>({humi_min:50,humi_max:75,light_min:20,light_max:80,enabled:1});
    const threshold\u56ed\u533as=computed(()=>{
      const ab=zones.value.filter(z=>{
        const name=String(z.name||'').trim().toUpperCase();
        return name.includes('A')||name.includes('B')||['1','2','园区1','园区2'].includes(name)||['esp32_001','esp32_s3_B001'].includes(z.esp32_device_id);
      });
      return ab.length ? ab : zones.value.slice(0,2);
    });
    async function loadSettings(){try{const r=await fetch('/api/settings');const d=await r.json();cfg.ai_api_key=d.ai_api_key||'';cfg.ai_api_base=d.ai_api_base||cfg.ai_api_base;cfg.ai_model=d.ai_model||cfg.ai_model;}catch(e){}}
    async function load\u56ed\u533as(){
      try{
        const r=await fetch('/api/zones');const d=await r.json();
        zones.value=(d.zones||[]).map(z=>({...z,thresholds:{...defaultThresholds(),...(z.thresholds||{})}}));
      }catch(e){zones.value=[];}
    }
    async function saveSettings(){
      try{await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ai_api_key:cfg.ai_api_key,ai_api_base:cfg.ai_api_base,ai_model:cfg.ai_model})});saved.value=true;setTimeout(()=>saved.value=false,2500);}catch(e){}
    }
    async function saveThreshold(zone){
      const t=zone.thresholds||defaultThresholds();
      const payload={humi_min:Number(t.humi_min),humi_max:Number(t.humi_max),light_min:Number(t.light_min),light_max:Number(t.light_max),enabled:Number(t.enabled)?1:0};
      try{
        await fetch(`/api/zones/${zone.id}/thresholds`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        thresholdSavedId.value=zone.id;
        setTimeout(()=>{if(thresholdSavedId.value===zone.id)thresholdSavedId.value=0;},2200);
      }catch(e){}
    }
    onMounted(()=>{loadSettings();load\u56ed\u533as();});
    return{cfg,saved,zones,threshold\u56ed\u533as,thresholdSavedId,saveSettings,saveThreshold};
  }
};
